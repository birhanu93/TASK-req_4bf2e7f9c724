services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: workforce
      MYSQL_USER: workforce
      MYSQL_PASSWORD: workforce
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3306:3306"
    tmpfs:
      - /var/lib/mysql

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: workforce
      DB_PASS: workforce
      DB_NAME: workforce
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "bin/console", "migrate"]
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: workforce
      DB_PASS: workforce
      DB_NAME: workforce
      STORAGE_ROOT: /app/storage
      DEMO_PASSWORD: "Demo!pass-1"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["php", "bin/console", "seed:demo"]
    volumes:
      - ./storage:/app/storage
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: workforce
      DB_PASS: workforce
      DB_NAME: workforce
      STORAGE_ROOT: /app/storage
      SESSION_COOKIE_SECURE: "false"
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: ["php", "-S", "0.0.0.0:8080", "-t", "public", "public/index.php"]
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE: "http://app:8080"
    depends_on:
      - app
    ports:
      - "5173:5173"

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: workforce
      DB_PASS: workforce
      DB_NAME: workforce
    depends_on:
      db:
        condition: service_healthy
    command: ["vendor/bin/phpunit", "--colors=always"]
    volumes:
      - ./coverage:/app/coverage
    profiles:
      - tests
